<div class="container fav-page">
  <h1>{{ 'MY_FAVORITES' | translate }}</h1>

  <div *ngIf="loading" class="empty"><i class="fa-solid fa-spinner fa-spin"></i> {{ 'LOADING' | translate }}</div>
  <div *ngIf="!loading && vehicles.length===0" class="empty"><i class="fa-regular fa-heart"></i><br>{{ 'NO_FAVORITES' | translate }}</div>

  <div class="grid fav-grid">
    <div class="vcard card" *ngFor="let v of vehicles">
      <div class="vcard-img" [style.background-image]="'url('+img(v)+')'"></div>
      <div class="vcard-body">
        <h3>{{ v.brand }} {{ v.model }}</h3>
        <div class="text-muted">{{ v.location }} · {{ v.year }}</div>
        <div class="vcard-price">$ {{ v.price | number }}</div>
        <div class="vcard-actions">
          <a class="btn btn-primary" [routerLink]="['/buyer/checkout', v.id]"><i class="fa-solid fa-cart-shopping"></i> {{ 'BUY' | translate }}</a>
          <button class="btn btn-ghost danger" (click)="remove(v)"><i class="fa-solid fa-heart-crack"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
