<div class="container form-page">
  <h1>{{ 'PUBLISH_VEHICLE' | translate }}</h1>
  <p class="text-muted">{{ 'PUBLISH_SUBTITLE' | translate }}</p>

  <div class="auth-success" *ngIf="success"><i class="fa-solid fa-circle-check"></i> {{ 'PUBLISH_SUCCESS' | translate }}</div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="card form-card" *ngIf="!success">
    <div class="form-grid">
      <div class="field"><label>{{ 'BRAND' | translate }}</label><input formControlName="brand" placeholder="Toyota"></div>
      <div class="field"><label>{{ 'MODEL' | translate }}</label><input formControlName="model" placeholder="Corolla"></div>
      <div class="field"><label>{{ 'YEAR' | translate }}</label><input formControlName="year" placeholder="2022"></div>
      <div class="field"><label>{{ 'PRICE' | translate }} (USD)</label><input type="number" formControlName="price" placeholder="15000"></div>
      <div class="field"><label>{{ 'COLOR' | translate }}</label><input formControlName="color" placeholder="Rojo"></div>
      <div class="field"><label>{{ 'TRANSMISSION' | translate }}</label>
        <select formControlName="transmission"><option>Automatica</option><option>Manual</option></select></div>
      <div class="field"><label>{{ 'ENGINE' | translate }}</label><input formControlName="engine" placeholder="1.8L"></div>
      <div class="field"><label>{{ 'MILEAGE' | translate }} (km)</label><input type="number" formControlName="mileage" placeholder="20000"></div>
      <div class="field"><label>{{ 'DOORS' | translate }}</label><input formControlName="doors" placeholder="4"></div>
      <div class="field"><label>{{ 'PLATE' | translate }}</label><input formControlName="plate" placeholder="ABC-123"></div>
      <div class="field"><label>{{ 'LOCATION' | translate }}</label><input formControlName="location" placeholder="Lima"></div>
      <div class="field"><label>{{ 'FUEL' | translate }}</label>
        <select formControlName="fuel"><option>Gasolina</option><option>Diesel</option><option>Electrico</option><option>Hibrido</option></select></div>
      <div class="field"><label>{{ 'TOP_SPEED' | translate }} (km/h)</label><input type="number" formControlName="topSpeed" placeholder="180"></div>
      <div class="field full"><label>{{ 'IMAGE_URL' | translate }}</label><input formControlName="images" placeholder="https://..."></div>
      <div class="field full"><label>{{ 'DESCRIPTION' | translate }}</label><textarea formControlName="description" rows="3"></textarea></div>
      <div class="field"><label>{{ 'CONTACT_NAME' | translate }}</label><input formControlName="contactName"></div>
      <div class="field"><label>{{ 'CONTACT_PHONE' | translate }}</label><input formControlName="contactPhone"></div>
      <div class="field"><label>{{ 'CONTACT_EMAIL' | translate }}</label><input formControlName="contactEmail" placeholder="email@test.com"></div>
    </div>

    <div class="auth-error" *ngIf="error">{{ error | translate }}</div>
    <div class="auth-error" *ngIf="form.invalid && form.touched">{{ 'FILL_REQUIRED' | translate }}</div>
    <button class="btn btn-primary" type="submit" [disabled]="loading">{{ loading ? ('LOADING'|translate) : ('PUBLISH'|translate) }}</button>
  </form>
</div>
