<div class="container ranking">
  <div class="rank-head">
    <h1><i class="fa-solid fa-trophy"></i> {{ 'TRUST_RANKING' | translate }}</h1>
    <p class="text-muted">{{ 'TRUST_RANKING_SUB' | translate }}</p>
  </div>

  <div class="tabs">
    <button [class.active]="tab==='sellers'" (click)="tab='sellers'">
      <i class="fa-solid fa-store"></i> {{ 'TOP_SELLERS' | translate }}
    </button>
    <button [class.active]="tab==='mechanics'" (click)="tab='mechanics'">
      <i class="fa-solid fa-wrench"></i> {{ 'TOP_MECHANICS' | translate }}
    </button>
  </div>

  <div *ngIf="loading" class="empty"><i class="fa-solid fa-spinner fa-spin"></i> {{ 'LOADING' | translate }}</div>
  <div *ngIf="!loading && current.length === 0" class="empty">{{ 'NO_RANKING' | translate }}</div>

  <div class="rank-list">
    <a class="rank-card card" *ngFor="let u of current; let i = index" [routerLink]="['/user', u.profileId]">
      <div class="rank-pos">{{ medal(i) }}</div>
      <div class="rank-info">
        <h3>{{ u.username || ('USER' | translate) + ' #' + u.profileId }}</h3>
        <div class="rank-stars">
          <app-star-rating [value]="u.average"></app-star-rating>
          <span class="rank-count">{{ u.count }} {{ 'REVIEWS' | translate }}</span>
        </div>
      </div>
      <div class="rank-badge">
        <app-trust-badge [average]="u.average" [count]="u.count" [role]="u.role"></app-trust-badge>
      </div>
    </a>
  </div>
</div>
