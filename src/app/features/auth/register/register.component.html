<div class="auth-wrap">
  <div class="auth-card card">
    <div class="auth-logo"><i class="fa-solid fa-car-side"></i> CAR<b>2</b>GO</div>
    <h2>{{ 'GET_STARTED' | translate }}</h2>
    <p class="text-muted">{{ 'REGISTER_SUBTITLE' | translate }}</p>

    <div class="auth-success" *ngIf="success"><i class="fa-solid fa-circle-check"></i> {{ 'REGISTER_SUCCESS' | translate }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success">
      <div class="field">
        <label>{{ 'USERNAME' | translate }}</label>
        <input type="text" formControlName="username" placeholder="usuario123">
      </div>
      <div class="field">
        <label>{{ 'EMAIL' | translate }}</label>
        <input type="email" formControlName="email" placeholder="email@car2go.com">
      </div>
      <div class="field">
        <label>{{ 'PASSWORD' | translate }}</label>
        <div class="pass">
          <input [type]="hide ? 'password' : 'text'" formControlName="password" placeholder="••••••••">
          <button type="button" (click)="hide=!hide"><i class="fa-solid" [class.fa-eye]="hide" [class.fa-eye-slash]="!hide"></i></button>
        </div>
      </div>
      <div class="field">
        <label>{{ 'I_AM' | translate }}</label>
        <div class="roles">
          <label class="role" [class.sel]="form.value.role==='ROLE_BUYER'">
            <input type="radio" formControlName="role" value="ROLE_BUYER"> <i class="fa-solid fa-cart-shopping"></i> {{ 'BUYER' | translate }}
          </label>
          <label class="role" [class.sel]="form.value.role==='ROLE_SELLER'">
            <input type="radio" formControlName="role" value="ROLE_SELLER"> <i class="fa-solid fa-tag"></i> {{ 'SELLER' | translate }}
          </label>
          <label class="role" [class.sel]="form.value.role==='ROLE_MECHANIC'">
            <input type="radio" formControlName="role" value="ROLE_MECHANIC"> <i class="fa-solid fa-wrench"></i> {{ 'MECHANIC' | translate }}
          </label>
        </div>
      </div>

      <div class="auth-error" *ngIf="error">{{ error | translate }}</div>

      <button class="btn btn-primary btn-block" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? ('LOADING' | translate) : ('SIGN_UP' | translate) }}
      </button>
    </form>

    <p class="text-center mt-2 text-muted">
      {{ 'HAVE_ACCOUNT' | translate }} <a routerLink="/login">{{ 'SIGN_IN' | translate }}</a>
    </p>
  </div>
</div>
