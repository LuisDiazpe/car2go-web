<div class="container mech-page">
  <h1>{{ 'PENDING_INSPECTIONS' | translate }}</h1>
  <p class="text-muted">{{ 'MECHANIC_SUBTITLE' | translate }}</p>

  <div class="info-msg" *ngIf="message">{{ message | translate }}</div>
  <div *ngIf="loading" class="empty"><i class="fa-solid fa-spinner fa-spin"></i> {{ 'LOADING' | translate }}</div>
  <div *ngIf="!loading && inspections.length===0" class="empty">{{ 'NO_PENDING' | translate }}</div>

  <div class="grid">
    <div class="card insp" *ngFor="let i of inspections">
      <div class="insp-head">
        <h3>{{ 'INSPECTION' | translate }} #{{ i.id }} <span class="badge" [ngClass]="statusClass(i.status)">{{ i.status }}</span></h3>
        <span class="text-muted">{{ 'VEHICLE_ID' | translate }}: {{ i.vehicleId }}</span>
      </div>

      <!-- Si está PENDING: botón asignarse -->
      <div *ngIf="i.status==='PENDING'" class="insp-actions">
        <button class="btn btn-primary" (click)="assign(i)"><i class="fa-solid fa-hand"></i> {{ 'ASSIGN_TO_ME' | translate }}</button>
      </div>

      <!-- Si está IN_PROGRESS: formulario aprobar/rechazar -->
      <div *ngIf="i.status==='IN_PROGRESS'" class="insp-form">
        <div class="field"><label>{{ 'NOTES' | translate }}</label>
          <input [(ngModel)]="notes[i.id!]" placeholder="{{ 'NOTES_PLACEHOLDER' | translate }}"></div>
        <div class="field"><label>{{ 'CERTIFICATE' | translate }}</label>
          <input [(ngModel)]="cert[i.id!]" placeholder="CERT-001"></div>
        <div class="insp-actions">
          <button class="btn btn-primary" (click)="approve(i)"><i class="fa-solid fa-check"></i> {{ 'APPROVE' | translate }}</button>
          <button class="btn btn-ghost danger" (click)="reject(i)"><i class="fa-solid fa-xmark"></i> {{ 'REJECT' | translate }}</button>
        </div>
      </div>
    </div>
  </div>
</div>
